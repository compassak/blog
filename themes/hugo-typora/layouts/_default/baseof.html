<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>

    <!-- CSS -->
    {{ $style := resources.Get "css/main.css" }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
    {{ $syntax := resources.Get "css/syntax.css" }}
    <link rel="stylesheet" href="{{ $syntax.RelPermalink }}">

    <!-- Local fonts -->
    <link rel="preload" href="{{ "fonts/jetbrains-mono-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ "fonts/inter-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ "fonts/noto-serif-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ "fonts/noto-serif-italic-latin.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ "fonts/material-symbols-outlined.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            corePlugins: {
                preflight: false, // Disabled preflight to preserve baseof.html and markdown styles
            },
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f3f4f5",
                        "outline-variant": "#bec8cb"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "Georgia", "Times New Roman", "Times", "serif"],
                        "body": ["Inter", "system-ui", "-apple-system", "Segoe UI", "Helvetica Neue", "Arial", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('{{ "fonts/jetbrains-mono-latin.woff2" | relURL }}') format('woff2');
            font-style: normal;
            font-weight: 400 600;
            font-display: block;
        }

        @font-face {
            font-family: 'Inter';
            src: url('{{ "fonts/inter-latin.woff2" | relURL }}') format('woff2');
            font-style: normal;
            font-weight: 300 700;
            font-display: block;
        }

        @font-face {
            font-family: 'Noto Serif';
            src: url('{{ "fonts/noto-serif-latin.woff2" | relURL }}') format('woff2');
            font-style: normal;
            font-weight: 400 700;
            font-display: block;
        }

        @font-face {
            font-family: 'Noto Serif';
            src: url('{{ "fonts/noto-serif-italic-latin.woff2" | relURL }}') format('woff2');
            font-style: italic;
            font-weight: 400;
            font-display: block;
        }

        @font-face {
            font-family: 'Material Symbols Outlined';
            src: url('{{ "fonts/material-symbols-outlined.woff2" | relURL }}') format('woff2');
            font-style: normal;
            font-weight: 100 700;
            font-display: block;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
            line-height: 1;
            overflow: hidden;
            white-space: nowrap;
            letter-spacing: normal;
            text-transform: none;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body>

    {{ partial "header.html" . }}
    <div class="container{{ if .IsPage }} page-single{{ end }}{{ if .IsHome }} page-home{{ end }}">

        <main class="content">
            {{ block "main" . }}{{ end }}
        </main>

    </div>

    <!-- Header Scroll Effect -->
    {{ $headerScroll := resources.Get "js/header-scroll.js" }}
    <script src="{{ $headerScroll.RelPermalink }}"></script>

    <!-- TOC Active State Script -->
    {{ $toc := resources.Get "js/toc.js" }}
    <script src="{{ $toc.RelPermalink }}"></script>
    <!-- Search Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/umd/index.min.js"></script>
    {{ $search := resources.Get "js/search.js" }}
    <script src="{{ $search.RelPermalink }}"></script>
</body>

</html>

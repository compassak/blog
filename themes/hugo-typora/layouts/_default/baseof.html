<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>

    <!-- CSS -->
    {{ $style := resources.Get "css/main.css" }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
    {{ $syntax := resources.Get "css/syntax.css" }}
    <link rel="stylesheet" href="{{ $syntax.RelPermalink }}">

    <!-- Fonts - JetBrains Mono for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- FontAwesome (Optional, loaded via CDN for now as per requirements to use Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fonts for the new Navbar -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind for the new Navbar -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            corePlugins: {
                preflight: false, // Disabled preflight to preserve baseof.html and markdown styles
            },
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f3f4f5",
                        "outline-variant": "#bec8cb"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    </style>
</head>

<body>

    {{ partial "header.html" . }}
    <div class="container{{ if .IsPage }} page-single{{ end }}{{ if .IsHome }} page-home{{ end }}">

        <main class="content">
            {{ block "main" . }}{{ end }}
        </main>

    </div>

    <!-- Header Scroll Effect -->
    {{ $headerScroll := resources.Get "js/header-scroll.js" }}
    <script src="{{ $headerScroll.RelPermalink }}"></script>

    <!-- TOC Active State Script -->
    {{ $toc := resources.Get "js/toc.js" }}
    <script src="{{ $toc.RelPermalink }}"></script>
    <!-- Search Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/umd/index.min.js"></script>
    {{ $search := resources.Get "js/search.js" }}
    <script src="{{ $search.RelPermalink }}"></script>
</body>

</html>
